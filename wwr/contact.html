<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
      content="Contact White Water Rafting Company for inquiries, reservations, and support.">
    <meta name="author" content="Johnson Doubeni">

    <title>Contact Us | White Water Rafting Company</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body class="contact-page">

    <!-- header -->
    <header>
        <img src="images/logo.jpg" alt="rafting-company" width="100">

        <!-- removed nested nav -->
        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <!-- CONTACT HEADER -->
        <section class="contact-header">
            <h1>White Water Rafting Company</h1>
            <p>Kolob,</p>
            <p>California, U.S.A,</p>
            <p>+18009033148929</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- CONTACT CONTENT -->
        <section class="contact-content">

            <!-- MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=Kolob,California&output=embed"
                  allowfullscreen loading="lazy">
                </iframe>
            </div>

            <!-- FORM -->
            <form class="contact-form">

                <!-- NAME -->
                <div class="form-row">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your full name please"
                      required>
                </div>

                <!--EMAIL -->
                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Your email please"
                      required>
                </div>

                <!-- RADIO BUTTONS -->
                <div class="form-row">
                    <label>Message Purpose</label>

                    <div class="radio-group">
                        <label>
                            <input type="radio" name="purpose" value="general" required>
                            General Inquiry
                        </label>

                        <label>
                            <input type="radio" name="purpose" value="reservation">
                            Reservation Question
                        </label>

                        <label>
                            <input type="radio" name="purpose" value="suggestion">
                            Website Suggestion
                        </label>
                    </div>
                </div>

                <!-- TEXTAREA -->
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Type here" required></textarea>

                <!-- CHECKBOX -->
                <label for="subscribe">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    Please Subscribe me to the monthly newsletter
                </label>

                <!-- BUTTON -->
                <button type="submit">Get in Touch!</button>

            </form>

        </section>

        <!-- TEAM SECTION -->
        <section class="team">
            <h2>We are here to serve you!</h2>

            <div class="team-grid">

                <figure>
                    <img src="../images/profile1.jpg" alt="Employee">
                    <figcaption>Johnson(Branch Manager)</figcaption>
                </figure>

                <figure>
                    <img src="../images/profile2.jpg" alt="Employee">
                    <figcaption>Doubeni(Administrator)</figcaption>
                </figure>

                <figure>
                    <img src="../images/profile3.jpg" alt="Employee">
                    <figcaption>Adam(Customer Service)</figcaption>
                </figure>

            </div>
        </section>

    </main>

    <!-- footer -->
    <footer>
        <p>&copy; 2026 JohnsonDoubeni Ltd | Johnson Doubeni</p>

        <nav class="socialmedia">
            <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer">
                <img src="images/facebook.png" alt="Facebook">
            </a>
            <a href="https://www.twitter.com" target="_blank" rel="noopener noreferrer">
                <img src="images/twitter.png" alt="Twitter">
            </a>
            <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer">
                <img src="images/instagram.png" alt="Instagram">
            </a>
        </nav>
    </footer>

</body>

</html>
