<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="About Rafting Adventures - rafting adventures and company history">
    <meta name="author" content="Johnson Doubeni">
    <title>JohnsonDoubeni Ltd - About Us</title>
    <link rel="stylesheet" href="styles/contact.css">
</head>

<body> <!-- header -->
    <header> <img src="images/logo.jpg" alt="JohnsonDoubeni Company Logo" width="100">
        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="about.html" aria-current="page">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <!-- CONTACT HEADER -->
        <section class="contact-header">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- CONTACT CONTENT -->
        <section class="contact-content">

            <!-- MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=Kolob,California&output=embed"
                  allowfullscreen="" loading="lazy">
                </iframe>
            </div>

            <!-- FORM -->
            <form class="contact-form">

                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Placeholder">

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Placeholder">

                <p>Message Purpose</p>
                <label><input type="radio" name="purpose"> General Inquiry</label>
                <label><input type="radio" name="purpose"> Reservation Question</label>
                <label><input type="radio" name="purpose"> Website Suggestion</label>

                <label for="message">Message</label>
                <textarea id="message" placeholder="Type here"></textarea>

                <label>
                    <input type="checkbox">
                    Please Subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>

            </form>

        </section>

        <!-- TEAM SECTION -->
        <section class="team">
            <h2>We Are Here to Serve You</h2>

            <div class="team-grid">

                <figure>
                    <img src="../images/profile1.jpg" alt="Employee">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure>
                    <img src="../images/profile2.jpg" alt="Employee">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure>
                    <img src="../images/profile3.jpg" alt="Employee">
                    <figcaption>Employee Profile</figcaption>
                </figure>

            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 JohnsonDoubeni Ltd | Johnson Doubeni</p>

        <nav class="socialmedia">
            <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer">
                <img src="../images/facebook.png" alt="Facebook">
            </a>
            <a href="https://www.twitter.com" target="_blank" rel="noopener noreferrer">
                <img src="../images/twitter.png" alt="Twitter">
            </a>
            <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer">
                <img src="../images/instagram.png" alt="Instagram">
            </a>
        </nav>
    </footer>

</body>

</html>
