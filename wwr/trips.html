<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

      content="Contact White Water Rafting Company for inquiries, reservations, and support.">
    <meta name="author" content="Johnson Doubeni">

    <title>Contact Us | White Water Rafting Company</title>

    <link rel="stylesheet" href="styles/trips.css">
</head>

<body class="trips-page">

    <!-- header  -->
    <header>
        <img src="images/logo.jpg" alt="rafting-company" width="100">

        <nav aria-label="Main Navigation">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </nav>
    </header>

    <!-- MAIN -->
    <main class="main">

        <!-- HERO SECTION -->
        <section class="hero">

            <!--  BACKGROUND IMAGE IN HTML -->
            <img src="images/rafting-bg.jpg" alt="Rafting Adventure" class="hero-bg">

            <div class="hero-content">
                <div class="hero-text">
                    <h1>Fun Season! Time to Take a Trip? </h1>
                    <p>Book Now! No Regrets, We Assured.</p>
                </div>

                <div class="hero-actions">
                    <div class="action">
                        <h3>Coaching Session</h3>
                        <button>BOOK NOW</button>
                    </div>

                    <div class="action">
                        <h3>Please book for an adventure</h3>
                        <button>BOOK NOW</button>
                    </div>
                </div>
            </div>

        </section>

        <!-- BOOKING SECTION -->
        <section class="booking">
            <h2>Online Booking</h2>

            <form class="booking-form">
                <input type="text" placeholder="Choose Your Package">
                <input type="date">
                <input type="email" placeholder="Email">
                <button type="submit">BOOK NOW</button>
            </form>
        </section>

    </main>

    <!-- footer  -->

            <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer">

            </a>
            <a href="https://www.twitter.com" target="_blank" rel="noopener noreferrer">

            </a>
            <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer">
